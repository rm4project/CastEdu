<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CastEdu - Smart School Display</title>
    <!-- גופן Heebo לעברית מודרנית -->
    <link href="https://googleapis.com" rel="stylesheet">
    <!-- Firebase SDK -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    
    <style>
        :root {
            --gold: #FFD700;
            --bg: #121212;
            --panel: #1f1f1f;
            --text: #ffffff;
            --success: #00FF41;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background: var(--bg); color: var(--text);
            font-family: 'Heebo', sans-serif;
            overflow: hidden;
        }
        
        .screen {
            display: grid;
            grid-template-rows: 120px 1fr 70px;
            height: 100vh;
        }

        /* סרגל עליון */
        header {
            background: var(--panel);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 50px;
            border-bottom: 4px solid var(--gold);
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .logo {
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: -1px;
        }
        .logo span { color: var(--gold); }

        .info-box {
            text-align: left;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        #clock {
            font-size: 4rem;
            color: var(--gold);
            font-weight: 900;
            line-height: 1;
        }

        #date-box {
            font-size: 1.3rem;
            margin-top: 5px;
            opacity: 0.8;
        }

        /* אזור התוכן המרכזי */
        main {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* אנימציית דפדוף (Slide) */
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .slide-card {
            background: #1e1e1e;
            width: 90%;
            max-width: 1300px;
            border-radius: 30px;
            border: 2px solid #333;
            padding: 50px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.7);
            text-align: center;
            animation: slideIn 1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .slide-title {
            font-size: 4rem;
            color: var(--gold);
            margin-bottom: 40px;
            font-weight: 900;
            border-bottom: 3px solid #333;
            display: inline-block;
            padding: 0 40px 10px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 3rem;
        }

        th {
            color: #888;
            font-size: 1.8rem;
            padding: 20px;
            border-bottom: 2px solid #444;
        }

        td {
            padding: 25px;
            border-bottom: 1px solid #2a2a2a;
        }

        .highlight {
            color: var(--success);
            font-weight: 700;
        }

        /* סטריפ רץ תחתון */
        footer {
            background: #000;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        .ticker-container {
            white-space: nowrap;
        }

        .ticker-text {
            display: inline-block;
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--gold);
            animation: ticker 35s linear infinite;
            padding-right: 100%;
        }

        @keyframes ticker {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>
<body>

<div class="screen">
    <header>
        <div class="logo">Cast<span>Edu</span></div>
        <div class="info-box">
            <div id="clock">00:00</div>
            <div id="date-box">טוען...</div>
        </div>
    </header>

    <main id="main-display">
        <div class="slide-card">
            <div class="slide-title">CastEdu</div>
            <p style="font-size:2.5rem; color:#888;">מתחבר לשידור חי...</p>
        </div>
    </main>

    <footer>
        <div class="ticker-container">
            <div class="ticker-text" id="ticker-content">
                ● ברוכים הבאים ל-CastEdu ● המערכת מעודכנת בזמן אמת על ידי הנהלת בית הספר ● יום לימודים פורה ומוצלח לכל התלמידים ● נא לשמור על ניקיון המסדרונות ● 
            </div>
        </div>
    </footer>
</div>

<script>
    // --- הגדרות ה-Firebase שלך ---
    const firebaseConfig = {
        databaseURL: "https://castedu-61e72-default-rtdb.europe-west1.firebasedatabase.app/"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // שעון ותאריך
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('he-IL', {hour: '2-digit', minute:'2-digit'});
        const options = { weekday: 'long', day: 'numeric', month: 'long' };
        document.getElementById('date-box').innerText = now.toLocaleDateString('he-IL', options) + " | ☀️ 24°C";
    }
    setInterval(updateClock, 1000);
    updateClock();

    let allChanges = [];
    let layers = [];
    let currentIndex = 0;

    // האזנה לשינויים ב-Firebase
    db.ref('data').on('value', snapshot => {
        const data = snapshot.val();
        allChanges = data ? Object.values(data) : [];
        
        // סינון שכבות ייחודיות
        layers = [...new Set(allChanges.map(c => c.layer))].sort();
        
        if (layers.length === 0) {
            renderWelcomeSlide();
        } else {
            // אם נוספו נתונים חדשים, נתחיל את הסבב מיד
            showNextSlide();
        }
    });

    function renderWelcomeSlide() {
        document.getElementById('main-display').innerHTML = `
            <div class="slide-card">
                <div class="slide-title">CastEdu</div>
                <p style="font-size:2.5rem; color:#aaa;">אין שינויי מערכת להיום.<br>הלימודים מתקיימים כסדרם.</p>
            </div>`;
    }

    function showNextSlide() {
        if (layers.length === 0) return;

        const currentLayer = layers[currentIndex];
        const layerData = allChanges.filter(c => c.layer === currentLayer);
        
        renderSlide(currentLayer, layerData);
        
        currentIndex = (currentIndex + 1) % layers.length;
    }

    function renderSlide(layer, data) {
        let rows = data.map(c => `
            <tr>
                <td>כיתה ${c.classNum}</td>
                <td>שיעור ${c.lesson}</td>
                <td class="highlight">${c.note}</td>
            </tr>
        `).join('');

        const container = document.getElementById('main-display');
        container.innerHTML = `
            <div class="slide-card" key="${Date.now()}">
                <div class="slide-title">שינויים - שכבה ${layer}</div>
                <table>
                    <thead>
                        <tr>
                            <th>כיתה</th>
                            <th>שיעור</th>
                            <th>עדכון</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${rows}
                    </tbody>
                </table>
            </div>`;
    }

    // החלפת שקופית כל 8 שניות
    setInterval(showNextSlide, 8000);

    // לחיצה בכל מקום למסך מלא (Kiosk Mode)
    document.body.addEventListener('click', () => {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen();
        }
    }, { once: true });

</script>
</body>
</html>
